<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F6E56" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sales Tracker" />
  <meta name="description" content="Track your daily sales and expenses — synced in real time" />
  <title>Sales Tracker ☁️</title>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tablericons/3.19.0/webfont/tabler-icons.min.css" />

  <style>
    :root {
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-tertiary: #9CA3AF;
      --color-text-success: #065F46;
      --color-text-danger: #991B1B;
      --color-text-info: #1D4ED8;
      --color-background-primary: #ffffff;
      --color-background-secondary: #F9FAFB;
      --color-background-success: #ECFDF5;
      --color-background-danger: #FEF2F2;
      --color-border-primary: #D1D5DB;
      --color-border-secondary: #E5E7EB;
      --color-border-tertiary: #F3F4F6;
      --color-border-danger: #FCA5A5;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --border-radius-sm: 6px;
      --border-radius-md: 10px;
      --border-radius-lg: 14px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    #root {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
    }

    .safe-top    { padding-top: env(safe-area-inset-top, 0px); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes slideUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

    .fade-in    { animation: slideUp 0.2s ease; }
    .shake      { animation: shake 0.35s ease; }

    .entry-row:hover, .entry-row:active { background: var(--color-background-secondary) !important; }
    .btn-tap:active { transform: scale(0.97); }

    .tab-btn {
      flex: 1; padding: 8px 4px;
      border: none; background: transparent; cursor: pointer;
      font-size: 11px; font-weight: 500;
      border-bottom: 2px solid transparent;
      color: var(--color-text-secondary);
      transition: all 0.15s; white-space: nowrap;
    }
    .tab-btn.active { color: #0F6E56; border-color: #0F6E56; }

    .pill-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }
    .low-badge  { display:inline-block; padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600; background:#FEF3C7; color:#92400E; }
    .out-badge  { display:inline-block; padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600; background:#FEE2E2; color:#991B1B; }

    input, select, textarea {
      padding: 10px 12px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-size: 14px; outline: none;
      width: 100%; font-family: var(--font-sans);
    }
    input:focus, select:focus {
      border-color: #0F6E56;
      box-shadow: 0 0 0 2px rgba(15,110,86,0.12);
    }

    .section-label {
      font-size: 11px; font-weight: 600;
      color: var(--color-text-secondary);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin: 0 0 6px;
    }
    .card {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 14px;
    }
    .progress-bar  { height:6px; border-radius:3px; background:var(--color-border-tertiary); overflow:hidden; margin-top:6px; }
    .progress-fill { height:100%; border-radius:3px; background:#0F6E56; transition:width 0.4s ease; }

    .pin-key {
      width: 64px; height: 56px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      cursor: pointer; font-size: 18px; font-weight: 600;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      transition: all 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .pin-key:active { transform: scale(0.93); background: var(--color-border-secondary); }
    .pin-key.danger { border-color: var(--color-border-danger); color: var(--color-text-danger); }

    .sync-dot {
      width:8px; height:8px; border-radius:50%; background:#10B981;
      display:inline-block; margin-right:5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .sync-dot.offline { background:#EF4444; animation:none; }

    .dot-indicator {
      width: 10px; height: 10px;
      border-radius: 50%; border: 1px solid var(--color-border-primary);
      background: transparent; transition: background 0.1s;
    }
    .dot-indicator.filled {
      background: #0F6E56; border-color: #0F6E56;
    }
  </style>
</head>
<body>

<!-- Connecting splash -->
<div id="setup-screen" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;font-family:sans-serif;">
  <div style="text-align:center;padding:40px 24px;">
    <div style="font-size:48px;margin-bottom:12px;">💹</div>
    <div style="width:28px;height:28px;border:2px solid #E5E7EB;border-top:2px solid #0F6E56;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <p style="margin:0;font-size:14px;color:#6B7280;">Connecting to cloud database…</p>
  </div>
</div>

<!-- Main app screen -->
<div id="app-screen" style="display:none;">
  <!-- Sync status bar -->
  <div id="sync-bar" style="background:#F0FDF4;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #D1FAE5;max-width:460px;margin:0 auto;">
    <span style="font-size:11px;color:#065F46;font-weight:600;display:flex;align-items:center;">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Connected — real-time database live</span>
    </span>
  </div>
  <div id="root"></div>
</div>

<!-- Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- Database Layer Module -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyACGvhzECNTVzMgNRJMxGei0480kdI9BQc",
    authDomain: "premier-sales-tracker-b7920.firebaseapp.com",
    databaseURL: "https://premier-sales-tracker-b7920-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "premier-sales-tracker-b7920",
    storageBucket: "premier-sales-tracker-b7920.firebasestorage.app",
    messagingSenderId: "1024596124716",
    appId: "1:1024596124716:web:c4ff43cb0fe015db1fdd89"
  };

  window._fbDb = null;
  window._firebaseReady = false;

  window._fb = {
    async get(key) {
      const dbRef = ref(window._fbDb, `salestracker/${key}`);
      const snap = await get(dbRef);
      return snap.exists() ? { key, value: JSON.stringify(snap.val()) } : null;
    },
    async set(key, value) {
      const dbRef = ref(window._fbDb, `salestracker/${key}`);
      await set(dbRef, JSON.parse(value));
      return { key, value };
    },
    async delete(key) {
      const dbRef = ref(window._fbDb, `salestracker/${key}`);
      await set(dbRef, null);
      return { key, deleted: true };
    },
    subscribe(key, callback) {
      const dbRef = ref(window._fbDb, `salestracker/${key}`);
      return onValue(dbRef, (snap) => {
        callback(snap.exists() ? JSON.stringify(snap.val()) : null);
      });
    }
  };

  function launchApp() {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    window.storage = window._fb;
    window._firebaseReady = true;
    if (window._startReact) {
      window._startReact();
    }
  }

  try {
    const app = initializeApp(FIREBASE_CONFIG);
    window._fbDb = getDatabase(app);
    
    if (window._reactReadySignal) {
      launchApp();
    } else {
      window._firebaseLoadedSignal = true;
    }
  } catch(e) {
    document.getElementById("setup-screen").innerHTML =
      `<div style="padding:40px 24px;text-align:center;font-family:sans-serif;">
        <p style="font-size:32px;">⚠️</p>
        <p style="font-size:16px;font-weight:700;">Could not connect to Realtime Database</p>
        <p style="font-size:13px;color:#6B7280;">${e.message}</p>
      </div>`;
  }
</script>

<!-- Interface Engine Block -->
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  const DEFAULT_CATEGORIES = {
    sale: ["Product sale", "Service", "Subscription", "Refund received", "Other income"],
    expense: ["Supplies", "Rent", "Utilities", "Salary", "Marketing", "Transport", "Food", "Other"],
  };

  const fmt = (n) => new Intl.NumberFormat("en-KE", { style: "currency", currency: "KES", maximumFractionDigits: 0 }).format(n);
  const dateKey = (d) => d.toISOString().slice(0, 10);
  const displayDate = (key) => {
    const today = dateKey(new Date());
    const yesterday = dateKey(new Date(Date.now() - 86400000));
    if (key === today) return "Today";
    if (key === yesterday) return "Yesterday";
    return new Date(key + "T12:00:00").toLocaleDateString("en-KE", { weekday: "short", month: "short", day: "numeric" });
  };

  const SALE_GREEN = "#0F6E56";
  const EXP_RED = "#993C1D";

  function SalesTracker() {
    const [entries, setEntries] = useState({});
    const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
    const [inventory, setInventory] = useState([]);
    const [currentDate, setCurrentDate] = useState(dateKey(new Date()));
    const [view, setView] = useState("dashboard");
    const [form, setForm] = useState({ type: "sale", amount: "", category: "", note: "" });
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [deleteId, setDeleteId] = useState(null);
    const [syncStatus, setSyncStatus] = useState("connected");

    const [histGroup, setHistGroup] = useState("day");
    const [collapsedGroups, setCollapsedGroups] = useState({});
    const [catMgmt, setCatMgmt] = useState({ open: false, type: "sale", newName: "" });

    const [invForm, setInvForm] = useState({ name: "", sku: "", qty: "", price: "", low: "" });
    const [invEditId, setInvEditId] = useState(null);
    const [invDeleteId, setInvDeleteId] = useState(null);
    const [stockAdjId, setStockAdjId] = useState(null);
    const [stockAdj, setStockAdj] = useState({ delta: "", note: "" });

    const CLEAR_PIN = "2668";
    const [pinUnlocked, setPinUnlocked] = useState(false);
    const [pinPromptOpen, setPinPromptOpen] = useState(false);
    const [pinInput, setPinInput] = useState("");
    const [pinError, setPinError] = useState(false);

    const [clearConfirm, setClearConfirm] = useState(false);

    const unsubscribers = useRef([]);

    useEffect(() => {
      let mounted = true;
      const storage = window._fb;

      if (!storage) return;

      const unsub1 = storage.subscribe("entries", (raw) => {
        if (!mounted) return;
        setEntries(raw ? JSON.parse(raw) : {});
      });
      const unsub2 = storage.subscribe("categories", (raw) => {
        if (!mounted) return;
        setCategories(raw ? JSON.parse(raw) : DEFAULT_CATEGORIES);
      });
      const unsub3 = storage.subscribe("inventory", (raw) => {
        if (!mounted) return;
        setInventory(raw ? JSON.parse(raw) : []);
      });

      unsubscribers.current = [unsub1, unsub2, unsub3];

      Promise.all([
        storage.get("entries").catch(() => null),
        storage.get("categories").catch(() => null),
        storage.get("inventory").catch(() => null),
      ]).then(([eRes, cRes, iRes]) => {
        if (!mounted) return;
        if (eRes) setEntries(JSON.parse(eRes.value));
        if (cRes) setCategories(JSON.parse(cRes.value));
        if (iRes) setInventory(JSON.parse(iRes.value));
        setLoading(false);
      }).catch(() => { if (mounted) setLoading(false); });

      const onOnline = () => { 
        setSyncStatus("connected"); 
        const dot = document.querySelector(".sync-dot");
        if (dot) dot.classList.remove("offline"); 
        const lbl = document.getElementById("sync-label");
        if (lbl) lbl.textContent = "Connected — real-time database live"; 
      };
      const onOffline = () => { 
        setSyncStatus("offline"); 
        const dot = document.querySelector(".sync-dot");
        if (dot) dot.classList.add("offline"); 
        const lbl = document.getElementById("sync-label");
        if (lbl) lbl.textContent = "Offline — changes will save locally and sync when online"; 
      };
      window.addEventListener("online", onOnline);
      window.addEventListener("offline", onOffline);

      return () => {
        mounted = false;
        unsubscribers.current.forEach(u => u && u());
        window.removeEventListener("online", onOnline);
        window.removeEventListener("offline", onOffline);
      };
    }, []);

    const saveEntries = async (updated) => {
      setEntries(updated);
      setSaving(true);
      try { await window._fb.set("entries", JSON.stringify(updated)); } catch {}
      setSaving(false);
    };

    const saveCategories = async (updated) => {
      setCategories(updated);
      try { await window._fb.set("categories", JSON.stringify(updated)); } catch {}
    };

    const saveInventory = async (updated) => {
      setInventory(updated);
      try { await window._fb.set("inventory", JSON.stringify(updated)); } catch {}
    };

    const dayEntries = entries[currentDate] || [];
    const sales = dayEntries.filter(e => e.type === "sale").reduce((s, e) => s + e.amount, 0);
    const expenses = dayEntries.filter(e => e.type === "expense").reduce((s, e) => s + e.amount, 0);
    const net = sales - expenses;

    const allEntries = Object.values(entries).flat();
    const saleEntries = allEntries.filter(e => e.type === "sale");
    const totalRevenue = saleEntries.reduce((s, e) => s + e.amount, 0);
    const productMap = {};
    saleEntries.forEach(e => {
      const key = e.category || "Other income";
      if (!productMap[key]) productMap[key] = { revenue: 0, count: 0 };
      productMap[key].revenue += e.amount;
      productMap[key].count += 1;
    });
    const topProducts = Object.entries(productMap).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 5);

    const addEntry = async () => {
      if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) return;
      const defaultCat = form.type === "sale" ? "Other income" : "Other";
      const entry = {
        id: Date.now().toString(),
        type: form.type,
        amount: parseFloat(form.amount),
        category: form.category || defaultCat,
        note: form.note,
        time: new Date().toLocaleTimeString("en-KE", { hour: "2-digit", minute: "2-digit" }),
      };
      const updated = { ...entries, [currentDate]: [entry, ...(entries[currentDate] || [])] };
      await saveEntries(updated);
      setForm({ type: form.type, amount: "", category: "", note: "" });
      setView("dashboard");
    };

    const requestDeleteEntry = (id) => {
      if (pinUnlocked) {
        setDeleteId(id);
      } else {
        setPinInput("");
        setPinError(false);
        setPinPromptOpen(true);
        // Save targeted action context to run automatically upon correct execution
        window._pendingDeleteId = id;
      }
    };

    const handlePinKeyPress = (num) => {
      setPinError(false);
      const nextInput = pinInput + num;
      if (nextInput.length <= 4) {
        setPinInput(nextInput);
        if (nextInput.length === 4) {
          if (nextInput === CLEAR_PIN) {
            setPinUnlocked(true);
            setPinPromptOpen(false);
            if (window._pendingDeleteId) {
              setDeleteId(window._pendingDeleteId);
              window._pendingDeleteId = null;
            }
          } else {
            setPinError(true);
            setPinInput("");
          }
        }
      }
    };

    const handlePinBackspace = () => {
      setPinInput(pinInput.slice(0, -1));
    };

    const deleteEntry = async (id) => {
      const updated = { ...entries, [currentDate]: dayEntries.filter(e => e.id !== id) };
      await saveEntries(updated);
      setDeleteId(null);
    };

    const shiftDate = (days) => {
      const d = new Date(currentDate + "T12:00:00");
      d.setDate(d.getDate() + days);
      setCurrentDate(dateKey(d));
    };

    const isToday = currentDate === dateKey(new Date());

    const addCategory = async () => {
      const name = catMgmt.newName.trim();
      if (!name) return;
      const updated = { ...categories, [catMgmt.type]: [...(categories[catMgmt.type] || []), name] };
      await saveCategories(updated);
      setCatMgmt(c => ({ ...c, newName: "" }));
    };

    const removeCategory = async (type, name) => {
      const updated = { ...categories, [type]: categories[type].filter(c => c !== name) };
      await saveCategories(updated);
    };

    const addOrUpdateInventory = async () => {
      if (!invForm.name.trim() || !invForm.qty || isNaN(invForm.qty)) return;
      if (invEditId) {
        const updated = inventory.map(item =>
          item.id === invEditId ? { ...item, name: invForm.name.trim(), sku: invForm.sku.trim(), qty: parseInt(invForm.qty), price: parseFloat(invForm.price) || 0, low: parseInt(invForm.low) || 5 } : item
        );
        await saveInventory(updated);
        setInvEditId(null);
      } else {
        const item = { id: Date.now().toString(), name: invForm.name.trim(), sku: invForm.sku.trim(), qty: parseInt(invForm.qty), price: parseFloat(invForm.price) || 0, low: parseInt(invForm.low) || 5, history: [] };
        await saveInventory([...inventory, item]);
      }
      setInvForm({ name: "", sku: "", qty: "", price: "", low: "" });
    };

    const deleteInventory = async (id) => {
      await saveInventory(inventory.filter(i => i.id !== id));
      setInvDeleteId(null);
    };

    const applyStockAdj = async () => {
      const delta = parseInt(stockAdj.delta);
      if (isNaN(delta)) return;
      const updated = inventory.map(item => {
        if (item.id !== stockAdjId) return item;
        const newQty = Math.max(0, item.qty + delta);
        const histEntry = { date: new Date().toLocaleDateString("en-KE", { month: "short", day: "numeric" }), delta, note: stockAdj.note, qty: newQty };
        return { ...item, qty: newQty, history: [histEntry, ...(item.history || [])].slice(0, 10) };
      });
      await saveInventory(updated);
      setStockAdjId(null);
      setStockAdj({ delta: "", note: "" });
    };

    const startEdit = (item) => {
      setInvForm({ name: item.name, sku: item.sku || "", qty: String(item.qty), price: String(item.price || ""), low: String(item.low || "") });
      setInvEditId(item.id);
    };

    const lowStockItems = inventory.filter(i => i.qty <= (i.low || 5));

    const getGroupKey = (dateStr, mode) => {
      const d = new Date(dateStr + "T12:00:00");
      if (mode === "day") return dateStr;
      if (mode === "month") return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      if (mode === "year") return `${d.getFullYear()}`;
      if (mode === "week") {
        const mon = new Date(d);
        mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
        return `week::${mon.toISOString().slice(0, 10)}`;
      }
      return dateStr;
    };

    const getGroupLabel = (key, mode) => {
      if (mode === "day") return displayDate(key);
      if (mode === "month") {
        const [y, m] = key.split("-");
        return new Date(+y, +m - 1, 1).toLocaleDateString("en-KE", { month: "long", year: "numeric" });
      }
      if (mode === "year") return key;
      if (mode === "week") {
        const monStr = key.replace("week::", "");
        const mon = new Date(monStr + "T12:00:00");
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        const fmtD = (d) => d.toLocaleDateString("en-KE", { month: "short", day: "numeric" });
        return `${fmtD(mon)} – ${fmtD(sun)}`;
      }
      return key;
    };

    const buildHistoryGroups = () => {
      const flat = [];
      Object.entries(entries).forEach(([dateStr, dayArr]) => {
        dayArr.forEach(e => flat.push({ ...e, dateStr }));
      });
      flat.sort((a, b) => b.dateStr.localeCompare(a.dateStr) || b.id.localeCompare(a.id));
      const groupMap = {};
      const groupOrder = [];
      flat.forEach(e => {
        const key = getGroupKey(e.dateStr, histGroup);
        if (!groupMap[key]) { groupMap[key] = []; groupOrder.push(key); }
        groupMap[key].push(e);
      });
      return groupOrder.map(key => ({
        key,
        label: getGroupLabel(key, histGroup),
        entries: groupMap[key],
        sales: groupMap[key].filter(e => e.type === "sale").reduce((s, e) => s + e.amount, 0),
        expenses: groupMap[key].filter(e => e.type === "expense").reduce((s, e) => s + e.amount, 0),
      }));
    };

    const toggleGroup = (key) => setCollapsedGroups(c => ({ ...c, [key]: !c[key] }));

    const handleClearData = async () => {
      setSaving(true);
      try {
        await window._fb.set("entries", JSON.stringify({}));
        await window._fb.set("inventory", JSON.stringify([]));
        await window._fb.set("categories", JSON.stringify(DEFAULT_CATEGORIES));
        setEntries({});
        setInventory([]);
        setCategories(DEFAULT_CATEGORIES);
        setClearConfirm(false);
        setView("dashboard");
      } catch (err) {
        console.error("Failed to wipe database: ", err);
      }
      setSaving(false);
    };

    const navItems = [
      ["dashboard", "ti-layout-dashboard", "Summary"],
      ["add", "ti-plus", "Add Entry"],
      ["history", "ti-list", "History"],
      ["inventory", "ti-package", "Inventory"],
      ["categories", "ti-tags", "Categories"],
    ];

    return (
      <div style={{ fontFamily: "var(--font-sans)", paddingBottom: 90 }} className="safe-top">
        {/* Header toolbar */}
        <div style={{ padding: "16px 16px 0", display: "flex", alignItems: "center", justifyBetween: "space-between", justifyContent: 'space-between' }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button onClick={() => shiftDate(-1)} style={{ border: "none", background: "none", cursor: "pointer", padding: 6, color: "var(--color-text-secondary)" }}>
              <i className="ti ti-chevron-left" style={{ fontSize: 18 }} />
            </button>
            <span style={{ fontWeight: 600, fontSize: 15 }}>{displayDate(currentDate)}</span>
            <button onClick={() => shiftDate(1)} disabled={isToday} style={{ border: "none", background: "none", cursor: "pointer", padding: 6, color: isToday ? "var(--color-border-secondary)" : "var(--color-text-secondary)" }}>
              <i className="ti ti-chevron-right" style={{ fontSize: 18 }} />
            </button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {pinUnlocked && (
              <span style={{ fontSize: 11, background: "var(--color-background-success)", color: "var(--color-text-success)", padding: "2px 8px", borderRadius: 12, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 4 }}>
                <i className="ti ti-lock-open" style={{ fontSize: 12 }} /> Editing Enabled
              </span>
            )}
            {lowStockItems.length > 0 && (
              <button onClick={() => setView("inventory")} style={{ border: "none", background: "#FEF3C7", borderRadius: 20, padding: "3px 9px", cursor: "pointer", fontSize: 11, fontWeight: 600, color: "#92400E", display: "flex", alignItems: "center", gap: 4 }}>
                <i className="ti ti-alert-triangle" style={{ fontSize: 12 }} />{lowStockItems.length} low
              </button>
            )}
            {!isToday && (
              <button onClick={() => setCurrentDate(dateKey(new Date()))} style={{ fontSize: 12, color: "var(--color-text-info)", background: "none", border: "none", cursor: "pointer" }}>
                Today
              </button>
            )}
            {saving && <span style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>Saving…</span>}
          </div>
        </div>

        {/* Tab Navigation */}
        <div style={{ display: "flex", borderBottom: "0.5px solid var(--color-border-tertiary)", margin: "12px 0 0", padding: "0 8px", overflowX: "auto" }}>
          {navItems.map(([v, icon, label]) => (
            <button key={v} onClick={() => setView(v)} className={`tab-btn${view === v ? " active" : ""}`} style={{ fontFamily: "var(--font-sans)" }}>
              <i className={`ti ${icon}`} style={{ fontSize: 15, display: "block", margin: "0 auto 2px" }} />
              {label}
            </button>
          ))}
        </div>

        {/* DASHBOARD VIEW */}
        {view === "dashboard" && (
          <div className="fade-in" style={{ padding: "16px" }}>
            <div style={{ background: net >= 0 ? "var(--color-background-success)" : "var(--color-background-danger)", borderRadius: "var(--border-radius-lg)", padding: "20px", marginBottom: 12, textAlign: "center" }}>
              <p style={{ fontSize: 11, color: net >= 0 ? "var(--color-text-success)" : "var(--color-text-danger)", margin: "0 0 4px", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 600 }}>Net Balance — {displayDate(currentDate)}</p>
              <p style={{ fontSize: 32, fontWeight: 600, margin: 0, color: net >= 0 ? "var(--color-text-success)" : "var(--color-text-danger)" }}>{fmt(Math.abs(net))}</p>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
              <div className="card">
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                  <i className="ti ti-arrow-up-circle" style={{ fontSize: 16, color: SALE_GREEN }} />
                  <span style={{ fontSize: 12, color: "var(--color-text-secondary)", fontWeight: 500 }}>Sales</span>
                </div>
                <p style={{ fontSize: 20, fontWeight: 600, margin: 0, color: SALE_GREEN }}>{fmt(sales)}</p>
                <p style={{ fontSize: 12, color: "var(--color-text-tertiary)", margin: "2px 0 0" }}>{dayEntries.filter(e => e.type === "sale").length} entries</p>
              </div>
              <div className="card">
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                  <i className="ti ti-arrow-down-circle" style={{ fontSize: 16, color: EXP_RED }} />
                  <span style={{ fontSize: 12, color: "var(--color-text-secondary)", fontWeight: 500 }}>Expenses</span>
                </div>
                <p style={{ fontSize: 20, fontWeight: 600, margin: 0, color: EXP_RED }}>{fmt(expenses)}</p>
                <p style={{ fontSize: 12, color: "var(--color-text-tertiary)", margin: "2px 0 0" }}>{dayEntries.filter(e => e.type === "expense").length} entries</p>
              </div>
            </div>
            
            {dayEntries.length > 0 ? (
              <div>
                <p className="section-label">Records Summary</p>
                {dayEntries.map(e => (
                  <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: 'center', padding: "12px 0", borderBottom: "1px solid var(--color-border-secondary)" }}>
                    <div>
                      <span style={{ fontWeight: 500, display: 'block' }}>{e.category}</span>
                      {e.note && <small style={{ color: "var(--color-text-secondary)", display: 'block' }}>{e.note}</small>}
                      <small style={{ color: "var(--color-text-tertiary)" }}>{e.time}</small>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ color: e.type === "sale" ? SALE_GREEN : EXP_RED, fontWeight: 600 }}>
                        {e.type === "sale" ? "+" : "-"}{fmt(e.amount)}
                      </span>
                      <button onClick={() => requestDeleteEntry(e.id)} style={{ border: 'none', background: 'none', color: pinUnlocked ? EXP_RED : 'var(--color-text-tertiary)', cursor: 'pointer', padding: 4 }}>
                        <i className={`ti ${pinUnlocked ? 'ti-trash' : 'ti-lock'}`} style={{ fontSize: 16 }} />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            ) : <p style={{ textAlign: "center", color: "var(--color-text-secondary)", fontSize: 13, marginTop: 24 }}>No entries recorded for this date.</p>}

            {deleteId && (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, zIndex: 100 }}>
                <div style={{ background: '#fff', borderRadius: 12, padding: 20, width: '100%', maxWidth: 320 }}>
                  <h3 style={{ margin: '0 0 8px' }}>Delete Entry?</h3>
                  <p style={{ margin: '0 0 20px', fontSize: 14, color: 'var(--color-text-secondary)' }}>Are you sure you want to completely remove this transaction record?</p>
                  <div style={{ display: 'flex', gap: 10 }}>
                    <button onClick={() => setDeleteId(null)} style={{ flex: 1, padding: 10, border: '1px solid var(--color-border-primary)', borderRadius: 8, background: '#fff' }}>Cancel</button>
                    <button onClick={() => deleteEntry(deleteId)} style={{ flex: 1, padding: 10, border: 'none', borderRadius: 8, background: EXP_RED, color: '#fff', fontWeight: 600 }}>Delete</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ADD TRANSACTIONS VIEW */}
        {view === "add" && (
          <div className="fade-in" style={{ padding: "16px" }}>
            <p className="section-label">Add Transaction Record</p>
            <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
              <button onClick={() => setForm({ ...form, type: "sale" })} style={{ flex: 1, padding: 12, background: form.type === "sale" ? SALE_GREEN : "var(--color-border-tertiary)", color: form.type === "sale" ? "#fff" : "var(--color-text-primary)", border: "none", borderRadius: 8, fontWeight: "bold" }}>Income / Sale</button>
              <button onClick={() => setForm({ ...form, type: "expense" })} style={{ flex: 1, padding: 12, background: form.type === "expense" ? EXP_RED : "var(--color-border-tertiary)", color: form.type === "expense" ? "#fff" : "var(--color-text-primary)", border: "none", borderRadius: 8, fontWeight: "bold" }}>Expense</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <input type="number" placeholder="Amount (KES)" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} />
              <select value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>
                <option value="">Select Category</option>
                {categories[form.type].map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <input type="text" placeholder="Add optional description note..." value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} />
              <button onClick={addEntry} style={{ padding: 14, background: "#0F6E56", color: "white", border: "none", borderRadius: 8, fontWeight: "bold", cursor: "pointer", marginTop: 8 }}>Save Entry to Database</button>
            </div>
          </div>
        )}

        {/* HISTORY OVERVIEW VIEW */}
        {view === "history" && (
          <div className="fade-in" style={{ padding: "16px" }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
              <p className="section-label" style={{ margin: 0 }}>Transaction History Ledger</p>
              <select style={{ width: 'auto', padding: '4px 8px', fontSize: 12 }} value={histGroup} onChange={e => setHistGroup(e.target.value)}>
                <option value="day">Group by Day</option>
                <option value="week">Group by Week</option>
                <option value="month">Group by Month</option>
                <option value="year">Group by Year</option>
              </select>
            </div>

            {buildHistoryGroups().map(g => {
              const isCollapsed = collapsedGroups[g.key];
              return (
                <div key={g.key} style={{ marginBottom: 12, border: '1px solid var(--color-border-secondary)', borderRadius: 8, overflow: 'hidden' }}>
                  <div onClick={() => toggleGroup(g.key)} style={{ background: 'var(--color-background-secondary)', padding: '10px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}>
                    <span style={{ fontWeight: 600, fontSize: 13 }}>{g.label}</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12 }}>
                      <span style={{ color: SALE_GREEN, fontWeight: 500 }}>+{fmt(g.sales)}</span>
                      <span style={{ color: EXP_RED, fontWeight: 500 }}>-{fmt(g.expenses)}</span>
                      <i className={`ti ${isCollapsed ? 'ti-chevron-down' : 'ti-chevron-up'}`} style={{ color: 'var(--color-text-tertiary)' }} />
                    </div>
                  </div>
                  {!isCollapsed && (
                    <div style={{ padding: '0 12px', background: '#fff' }}>
                      {g.entries.map((e, idx) => (
                        <div key={e.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: idx === g.entries.length - 1 ? 'none' : '1px solid var(--color-border-tertiary)' }}>
                          <div>
                            <span style={{ fontSize: 13, fontWeight: 500 }}>{e.category}</span>
                            {histGroup !== 'day' && <small style={{ display: 'block', color: 'var(--color-text-tertiary)' }}>{displayDate(e.dateStr)}</small>}
                          </div>
                          <span style={{ color: e.type === 'sale' ? SALE_GREEN : EXP_RED, fontSize: 13, fontWeight: 600 }}>
                            {e.type === 'sale' ? '+' : '-'}{fmt(e.amount)}
                          </span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* INVENTORY MANAGEMENT VIEW */}
        {view === "inventory" && (
          <div className="fade-in" style={{ padding: "16px" }}>
            <p className="section-label">{invEditId ? "Edit Item Properties" : "Register Stock Item"}</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }} className="card">
              <input type="text" placeholder="Item Name" value={invForm.name} onChange={e => setInvForm({ ...invForm, name: e.target.value })} />
              <div style={{ display: 'flex', gap: 8 }}>
                <input type="text" placeholder="SKU / Barcode" value={invForm.sku} onChange={e => setInvForm({ ...invForm, sku: e.target.value })} />
                <input type="number" placeholder="Stock Qty" disabled={!!invEditId} value={invForm.qty} onChange={e => setInvForm({ ...invForm, qty: e.target.value })} />
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <input type="number" placeholder="Retail Price" value={invForm.price} onChange={e => setInvForm({ ...invForm, price: e.target.value })} />
                <input type="number" placeholder="Low Stock Trigger Alert" value={invForm.low} onChange={e => setInvForm({ ...invForm, low: e.target.value })} />
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
                {invEditId && <button onClick={() => { setInvEditId(null); setInvForm({ name: "", sku: "", qty: "", price: "", low: "" }); }} style={{ flex: 1, padding: 10, background: '#fff', border: '1px solid var(--color-border-primary)', borderRadius: 8 }}>Cancel</button>}
                <button onClick={addOrUpdateInventory} style={{ flex: 2, padding: 10, background: '#0F6E56', color: '#fff', border: 'none', borderRadius: 8, fontWeight: 600 }}>{invEditId ? "Apply Modifications" : "Add to Stock Roll"}</button>
              </div>
            </div>

            <p className="section-label">Active Ledger Inventory</p>
            {inventory.map(item => {
              const isLow = item.qty <= (item.low || 5);
              return (
                <div key={item.id} style={{ padding: 12, borderBottom: '1px solid var(--color-border-secondary)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <span style={{ fontWeight: 600 }}>{item.name}</span>
                    <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
                      <span className={isLow ? "out-badge" : "low-badge"} style={{ background: isLow ? 'var(--color-background-danger)' : 'var(--color-border-tertiary)', color: isLow ? 'var(--color-text-danger)' : 'var(--color-text-secondary)' }}>Qty: {item.qty}</span>
                      <span style={{ fontSize: 11, color: 'var(--color-text-secondary)' }}>{fmt(item.price || 0)}</span>
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => setStockAdjId(item.id)} style={{ padding: '6px 10px', fontSize: 12, borderRadius: 6, border: '1px solid var(--color-border-primary)', background: '#fff' }}>Adj Qty</button>
                    <button onClick={() => startEdit(item)} style={{ padding: '6px', borderRadius: 6, border: 'none', background: 'var(--color-border-tertiary)' }}><i className="ti ti-edit" /></button>
                    <button onClick={() => setInvDeleteId(item.id)} style={{ padding: '6px', borderRadius: 6, border: 'none', background: 'var(--color-background-danger)', color: 'var(--color-text-danger)' }}><i className="ti ti-trash" /></button>
                  </div>
                </div>
              );
            })}

            {/* Adjust Stock Level Overlay Modal */}
            {stockAdjId && (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, zIndex: 100 }}>
                <div style={{ background: '#fff', borderRadius: 12, padding: 20, width: '100%', maxWidth: 320 }}>
                  <h3 style={{ margin: '0 0 12px' }}>Adjust Level Stock</h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    <input type="number" placeholder="Delta (e.g. +10 or -5)" value={stockAdj.delta} onChange={e => setStockAdj({ ...stockAdj, delta: e.target.value })} />
                    <input type="text" placeholder="Adjustment Note" value={stockAdj.note} onChange={e => setStockAdj({ ...stockAdj, note: e.target.value })} />
                    <div style={{ display: 'flex', gap: 10, marginTop: 10 }}>
                      <button onClick={() => setStockAdjId(null)} style={{ flex: 1, padding: 10, border: '1px solid var(--color-border-primary)', borderRadius: 8, background: '#fff' }}>Cancel</button>
                      <button onClick={applyStockAdj} style={{ flex: 1, padding: 10, border: 'none', borderRadius: 8, background: '#0F6E56', color: '#fff', fontWeight: 600 }}>Save Level</button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* CATEGORIES MANAGEMENT & WIPE PANEL */}
        {view === "categories" && (
          <div className="fade-in" style={{ padding: "16px" }}>
            <p className="section-label">Manage Categories</p>
            <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
              <button onClick={() => setCatMgmt({ ...catMgmt, type: 'sale' })} style={{ flex: 1, padding: 8, fontSize: 12, borderRadius: 6, border: 'none', background: catMgmt.type === 'sale' ? SALE_GREEN : 'var(--color-border-tertiary)', color: catMgmt.type === 'sale' ? '#fff' : 'var(--color-text-primary)', fontWeight: 600 }}>Sales Labels</button>
              <button onClick={() => setCatMgmt({ ...catMgmt, type: 'expense' })} style={{ flex: 1, padding: 8, fontSize: 12, borderRadius: 6, border: 'none', background: catMgmt.type === 'expense' ? EXP_RED : 'var(--color-border-tertiary)', color: catMgmt.type === 'expense' ? '#fff' : 'var(--color-text-primary)', fontWeight: 600 }}>Expense Labels</button>
            </div>

            <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
              <input type="text" placeholder={`New ${catMgmt.type} label name...`} value={catMgmt.newName} onChange={e => setCatMgmt({ ...catMgmt, newName: e.target.value })} />
              <button onClick={addCategory} style={{ width: 'auto', padding: '0 16px', background: '#0F6E56', color: '#fff', border: 'none', borderRadius: 8, fontWeight: 600 }}>Add</button>
            </div>

            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 40 }}>
              {categories[catMgmt.type].map(c => (
                <span key={c} className="pill-tag">
                  {c}
                  <i className="ti ti-x" onClick={() => removeCategory(catMgmt.type, c)} style={{ cursor: 'pointer', fontSize: 12, marginLeft: 4, color: 'var(--color-text-tertiary)' }} />
                </span>
              ))}
            </div>

            {/* Clear Database Actions Section */}
            <p className="section-label" style={{ color: "var(--color-text-danger)" }}>System Maintenance & Purge</p>
            <div style={{ border: "1px solid var(--color-border-danger)", borderRadius: 10, padding: 14 }} className="card">
              <h4 style={{ margin: "0 0 6px", color: "var(--color-text-danger)" }}>Wipe Ledger Database</h4>
              <p style={{ margin: "0 0 14px", fontSize: 12, color: "var(--color-text-secondary)" }}>Permanently purges all transaction logs, categories custom allocations, and inventory stock rolls.</p>
              <button onClick={() => setClearConfirm(true)} style={{ background: "var(--color-background-danger)", border: "1px solid var(--color-border-danger)", color: "var(--color-text-danger)", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                Execute Complete System Wipe
              </button>
            </div>

            {/* Wipe Confirmation Overlay Modal */}
            {clearConfirm && (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, zIndex: 110 }}>
                <div style={{ background: '#fff', borderRadius: 12, padding: 20, width: '100%', maxWidth: 360 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, color: "var(--color-text-danger)" }}>
                    <i className="ti ti-alert-triangle" style={{ fontSize: 22 }} />
                    <h3 style={{ margin: 0 }}>Absolute Hard Reset?</h3>
                  </div>
                  <p style={{ margin: "0 0 12px", fontSize: 13, color: "var(--color-text-secondary)" }}>This will restore the workspace back to original factory parameters. Data states from current cloud pipeline will clear entirely.</p>
                  
                  <div style={{ background: "var(--color-background-danger)", padding: 12, borderRadius: 8, marginTop: 20 }}>
                    <p style={{ fontSize: 12, color: "var(--color-text-danger)", margin: 0, fontWeight: 500 }}>⚠️ These actions cannot be undone. Make sure you have backed up your data before proceeding.</p>
                  </div>

                  <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                    <button onClick={() => setClearConfirm(false)} style={{ flex: 1, padding: 12, border: '1px solid var(--color-border-primary)', borderRadius: 8, background: '#fff', fontWeight: 500 }}>Cancel</button>
                    <button onClick={handleClearData} style={{ flex: 1, padding: 12, border: 'none', borderRadius: 8, background: EXP_RED, color: '#fff', fontWeight: 600 }}>Wipe All Data</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* PROTECTED SECURITY PAD OVERLAY MODAL */}
        {pinPromptOpen && (
          <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, zIndex: 200 }}>
            <div className={`fade-in ${pinError ? 'shake' : ''}`} style={{ background: '#fff', borderRadius: 16, padding: "24px 20px", width: '100%', maxWidth: 300, textAlign: 'center' }}>
              <div style={{ width: 44, height: 44, borderRadius: '50%', background: pinError ? 'var(--color-background-danger)' : 'var(--color-border-tertiary)', color: pinError ? 'var(--color-text-danger)' : '#0F6E56', display: 'flex', alignItems: 'center', justifyContext: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                <i className={`ti ${pinError ? 'ti-lock-square-rounded-x' : 'ti-lock'}`} style={{ fontSize: 20 }} />
              </div>
              <h3 style={{ margin: '0 0 4px', fontSize: 16, fontWeight: 600 }}>Security Verification</h3>
              <p style={{ margin: '0 0 20px', fontSize: 12, color: pinError ? 'var(--color-text-danger)' : 'var(--color-text-secondary)' }}>
                {pinError ? "Invalid security PIN code. Try again." : "Enter manager code to authorize delete actions."}
              </p>

              {/* Visualized Pin Length Indicators */}
              <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginBottom: 28 }}>
                {[0, 1, 2, 3].map(idx => (
                  <div key={idx} className={`dot-indicator ${pinInput.length > idx ? 'filled' : ''}`} />
                ))}
              </div>

              {/* 3x4 Grid Button Pad layout */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: "12px 16px", justifyItems: 'center' }}>
                {["1", "2", "3", "4", "5", "6", "7", "8", "9"].map(num => (
                  <button key={num} onClick={() => handlePinKeyPress(num)} className="pin-key">{num}</button>
                ))}
                <button onClick={() => { setPinPromptOpen(false); window._pendingDeleteId = null; }} className="pin-key danger" style={{ fontSize: 13 }}><i className="ti ti-x" /></button>
                <button onClick={() => handlePinKeyPress("0")} className="pin-key">0</button>
                <button onClick={handlePinBackspace} className="pin-key" style={{ fontSize: 15 }}><i className="ti ti-backspace" /></button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const container = document.getElementById("root");
  const root = ReactDOM.createRoot(container);

  window._startReact = () => {
    root.render(<SalesTracker />);
  };

  if (window._firebaseLoadedSignal) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    window.storage = window._fb;
    window._startReact();
  } else {
    window._reactReadySignal = true;
  }
</script>
</body>
</html>
